name: Documentation

on:
  push:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "render.yaml"
      - "README.md"
      - "**/*.md"
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - "render.yaml"
      - "README.md"
      - "**/*.md"

permissions:
  contents: read

jobs:
  strict-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install -e ".[docs]"
      - run: mkdocs build --strict
