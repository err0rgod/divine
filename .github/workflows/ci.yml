name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-matrix:
    name: Tests (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test]"
      - run: pytest -q

  quality:
    name: Quality, coverage, package, docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[test,docs]"
      - run: ruff format --check src tests migrations
      - run: ruff check src tests migrations
      - run: mypy src/divine_router
      - name: Core coverage gate
        run: >-
          pytest -q
          --cov=divine_router.protocols
          --cov=divine_router.routing
          --cov=divine_router.reliability
          --cov-report=term-missing
      - run: python -m build
      - run: mkdocs build --strict
      - name: Tracked-file secret heuristics
        shell: bash
        run: |
          if git grep -nEI '(api[_-]?key|authorization|token|secret)[[:space:]]*[=:][[:space:]]*["'"'][A-Za-z0-9_-]{12,}' -- ':!uv.lock' ':!Agents.md'; then
            echo "Potential committed credential detected" >&2
            exit 1
          fi

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: divine-router:ci
