<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg-grad: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --accent-cyan: #06b6d4;
            --accent-purple: #8b5cf6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-grad);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar */
        nav {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--text-main);
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
            box-sizing: border-box;
        }

        /* Stats Section */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 32px;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* Glowing orb effect behind stats */
        .stat-card::before {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 100px;
            height: 100px;
            background: var(--accent-purple);
            filter: blur(60px);
            opacity: 0.3;
            border-radius: 50%;
        }

        .stat-card:nth-child(2)::before {
            background: var(--accent-cyan);
        }

        .stat-card:nth-child(3)::before {
            background: #10b981; /* Green for money */
        }

        .stat-title {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
        }

        /* Keys Section */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-cyan));
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .keys-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 24px;
        }

        .key-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
        }

        .key-provider-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .key-textarea {
            width: 100%;
            height: 100px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            color: #10b981; /* Hacker green for keys */
            font-family: monospace;
            padding: 12px;
            box-sizing: border-box;
            resize: vertical;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .key-textarea:focus {
            border-color: var(--accent-cyan);
        }

        .key-help {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--accent-cyan);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
        }

        #toast.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Divine Dashboard</div>
        <a href="/">← Back to Chat</a>
    </nav>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">Total Tokens Used</div>
                <div class="stat-value" id="val-tokens">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Total API Requests</div>
                <div class="stat-value" id="val-requests">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">Money Saved</div>
                <div class="stat-value" style="color: #10b981;">$<span id="val-savings">0.00</span></div>
            </div>
        </div>

        <div class="section-header">
            <h2 class="section-title">API Key Management</h2>
            <button class="btn-primary" onclick="saveKeys()">Save & Sync Keys</button>
        </div>
        
        <p style="color: var(--text-muted); margin-bottom: 24px;">Enter one API key per line. The router will randomly pick from these keys for load balancing. Reorder them as you see fit.</p>

        <div class="keys-grid" id="keys-container">
            <!-- Populated by JS -->
        </div>
    </div>

    <div id="toast">Keys Saved Successfully!</div>

    <script>
        // Fetch stats
        fetch('/api/dashboard/stats')
            .then(res => res.json())
            .then(data => {
                document.getElementById('val-tokens').innerText = data.total_tokens.toLocaleString();
                document.getElementById('val-requests').innerText = data.requests_made.toLocaleString();
                document.getElementById('val-savings').innerText = parseFloat(data.total_savings_usd).toFixed(2);
            });

        // Fetch keys
        fetch('/api/dashboard/keys')
            .then(res => res.json())
            .then(keysDict => {
                const container = document.getElementById('keys-container');
                
                // Providers we care about managing
                const providers = ["Mistral", "Groq", "Cerebras", "NVIDIA", "Bazaarlink", "Cohere", "Bluesmind", "AgentRouter", "ForgeAI", "FuturePPO", "DeepSeek", "Exa", "Firecrawl", "Jina"];
                
                // Merge known providers with any existing ones in keysDict
                Object.keys(keysDict).forEach(k => {
                    if(!providers.includes(k)) providers.push(k);
                });

                providers.forEach(provider => {
                    const card = document.createElement('div');
                    card.className = 'key-card';
                    
                    const titleDiv = document.createElement('div');
                    titleDiv.className = 'key-provider-title';
                    
                    const title = document.createElement('span');
                    title.innerText = provider;
                    
                    const testBtn = document.createElement('button');
                    testBtn.innerText = 'Test Keys';
                    testBtn.style.cssText = 'background: rgba(6, 182, 212, 0.2); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); border-radius: 4px; padding: 4px 8px; font-size: 0.8rem; cursor: pointer;';
                    testBtn.onclick = () => testProvider(provider, testBtn);
                    
                    titleDiv.appendChild(title);
                    if(provider !== "Exa" && provider !== "Firecrawl" && provider !== "Jina" && provider !== "FuturePPO") {
                        titleDiv.appendChild(testBtn);
                    }
                    
                    const textarea = document.createElement('textarea');
                    textarea.className = 'key-textarea';
                    textarea.id = `key-${provider}`;
                    textarea.placeholder = "Enter keys here (one per line)";
                    
                    if (keysDict[provider]) {
                        textarea.value = keysDict[provider].join('\n');
                    }
                    
                    const help = document.createElement('div');
                    help.className = 'key-help';
                    help.innerText = "1 key per line. Router randomly balances load.";

                    card.appendChild(titleDiv);
                    card.appendChild(textarea);
                    card.appendChild(help);
                    container.appendChild(card);
                });
            });

        // Test Provider
        function testProvider(provider, btn) {
            btn.innerText = "Testing...";
            fetch('/api/dashboard/keys/test', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ provider })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    btn.innerText = "✅ Passed";
                    btn.style.background = "rgba(16, 185, 129, 0.2)";
                    btn.style.color = "#10b981";
                    btn.style.borderColor = "#10b981";
                } else {
                    btn.innerText = "❌ Failed";
                    btn.style.background = "rgba(239, 68, 68, 0.2)";
                    btn.style.color = "#ef4444";
                    btn.style.borderColor = "#ef4444";
                    alert(provider + " Test Failed:\n" + data.error);
                }
                setTimeout(() => {
                    btn.innerText = "Test Keys";
                    btn.style.cssText = 'background: rgba(6, 182, 212, 0.2); color: var(--accent-cyan); border: 1px solid var(--accent-cyan); border-radius: 4px; padding: 4px 8px; font-size: 0.8rem; cursor: pointer;';
                }, 5000);
            })
            .catch(err => {
                btn.innerText = "Error";
            });
        }

        // Save keys
        function saveKeys() {
            const keysDict = {};
            const textareas = document.querySelectorAll('.key-textarea');
            
            textareas.forEach(ta => {
                const provider = ta.id.replace('key-', '');
                const rawKeys = ta.value.split('\n');
                const validKeys = rawKeys.map(k => k.trim()).filter(k => k.length > 0);
                if (validKeys.length > 0) {
                    keysDict[provider] = validKeys;
                }
            });

            fetch('/api/dashboard/keys', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(keysDict)
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    const toast = document.getElementById('toast');
                    toast.classList.add('show');
                    setTimeout(() => toast.classList.remove('show'), 3000);
                }
            });
        }
    </script>
</body>
</html>
