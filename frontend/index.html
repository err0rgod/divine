<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divine Voice Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  </head>
  <body>
    <div class="app-container">
      <div class="lang-toggle">
        <select id="lang-select">
          <option value="en">English</option>
          <option value="hi">Hindi</option>
        </select>
      </div>
      <div class="voice-ui">
        <h1 class="title">Divine</h1>
        <p class="status-text" id="status-text">Tap to connect</p>
        
        <div class="orb-container" id="orb-btn">
          <div class="orb" id="orb">
            <i class="ri-mic-fill" id="mic-icon"></i>
          </div>
          <div class="ripple" id="ripple1"></div>
          <div class="ripple" id="ripple2"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
