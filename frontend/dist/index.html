<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Divine Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-glL3hPaf.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-B42T39m1.css">
  </head>
  <body>
    <div class="app-container">
      
      <header class="app-header">
        <div class="tabs">
          <button id="tab-voice" class="tab-btn active"><i class="ri-mic-2-line"></i> Voice Mode</button>
          <button id="tab-chat" class="tab-btn"><i class="ri-chat-3-line"></i> Chat Mode</button>
        </div>
        <div class="lang-toggle">
          <select id="lang-select">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
          </select>
        </div>
      </header>

      <div class="content-wrapper">
        <!-- Voice UI -->
        <div id="view-voice" class="view-section active">
          <div class="voice-ui">
            <h1 class="title">Divine</h1>
            <p class="status-text" id="status-text">Tap to connect</p>
            
            <div class="orb-container" id="orb-btn">
              <div class="orb" id="orb">
                <i class="ri-mic-fill" id="mic-icon"></i>
              </div>
              <div class="ripple" id="ripple1"></div>
              <div class="ripple" id="ripple2"></div>
            </div>
          </div>
        </div>

        <!-- Chat UI -->
        <div id="view-chat" class="view-section">
          <div class="chat-container">
            <div id="chat-messages" class="messages-area">
              <div class="welcome-message" id="welcome-message">
                <h2>Hi, I'm Divine</h2>
                <p>Your personal AI assistant. Type a message to begin.</p>
              </div>
            </div>

            <form id="chat-form" class="glass-input-area">
              <input type="text" id="message-input" placeholder="Type a message..." autocomplete="off" />
              <button type="submit" id="send-btn" class="icon-btn send-btn" title="Send Message">
                <i class="ri-send-plane-fill"></i>
              </button>
            </form>
          </div>
        </div>
      </div>

    </div>
  </body>
</html>
