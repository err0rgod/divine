<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine | Intelligence Engine</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        gray: { 50: '#f9fafb', 100: '#f3f4f6', 200: '#e5e7eb', 300: '#d1d5db', 400: '#9ca3af', 500: '#6b7280', 600: '#4b5563', 700: '#374151', 800: '#1f2937', 900: '#111827', 950: '#030712' }
                    }
                }
            }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-thumb { background-color: rgba(156, 163, 175, 0.3); border-radius: 4px; }
        .dark .chat-scroll::-webkit-scrollbar-thumb { background-color: rgba(255, 255, 255, 0.1); }

        .dot { animation: blink 1.4s infinite both; height: 4px; width: 4px; background: currentColor; border-radius: 50%; display: inline-block; margin: 0 2px; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

        .nav-btn.active {
            background: rgba(156, 163, 175, 0.2);
            color: #111827;
            border-left: 2px solid #374151;
        }
        .dark .nav-btn.active {
            background: rgba(255, 255, 255, 0.1);
            color: #f3f4f6;
            border-left: 2px solid #9ca3af;
        }
        .nav-btn { border-left: 2px solid transparent; }

        .tab-content { display: none; }
        .tab-content.active { display: flex; }

        /* Code Block Copy Button */
        pre { position: relative; }
        .copy-btn {
            position: absolute; top: 0.5rem; right: 0.5rem;
            background: rgba(255,255,255,0.1); color: #9ca3af;
            border: 1px solid rgba(255,255,255,0.1); border-radius: 0.25rem;
            padding: 0.25rem 0.5rem; font-size: 0.7rem; font-family: sans-serif;
            cursor: pointer; transition: all 0.2s; opacity: 0;
        }
        .dark .copy-btn { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); }
        pre:hover .copy-btn { opacity: 1; }
        .copy-btn:hover { color: #fff; background: rgba(255,255,255,0.2); }
        
        /* Resizer */
        #resizer { width: 5px; cursor: col-resize; background: transparent; z-index: 50; }
        #resizer:hover, #resizer:active { background: #9ca3af; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 h-screen w-screen overflow-hidden flex antialiased transition-colors duration-300">

    <!-- Extreme Left Vertical Nav -->
    <nav class="w-16 h-full bg-gray-200 dark:bg-gray-900 border-r border-gray-300 dark:border-gray-800 flex flex-col items-center py-4 z-30 justify-between transition-colors duration-300">
        <div class="flex flex-col gap-2 w-full">
            <div class="mb-6 flex justify-center">
                <svg class="w-8 h-8 text-gray-700 dark:text-gray-300" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            <button onclick="switchTab('history')" id="navHistory" class="nav-btn active w-full py-3 flex justify-center text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 transition-colors" title="Chat History">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </button>
            <button onclick="switchTab('logs')" id="navLogs" class="nav-btn w-full py-3 flex justify-center text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 transition-colors" title="Engine Logs">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
            </button>
            <button onclick="switchTab('health')" id="navHealth" class="nav-btn w-full py-3 flex justify-center text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 transition-colors" title="API Health">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </button>
        </div>
        
        <!-- Theme Toggle -->
        <button onclick="toggleTheme()" class="w-full py-3 flex justify-center text-gray-500 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 transition-colors" title="Toggle Theme">
            <!-- Sun Icon for Dark Mode -->
            <svg id="themeIconDark" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
            <!-- Moon Icon for Light Mode -->
            <svg id="themeIconLight" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
        </button>
    </nav>

    <!-- Collapsible Sidebar Panel -->
    <aside id="sidebar" class="h-full bg-white dark:bg-gray-800 border-r border-gray-300 dark:border-gray-700 flex flex-col transition-colors duration-300 relative z-20" style="width: 320px; min-width: 200px; max-width: 600px;">
        
        <!-- Header -->
        <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
            <span id="sidebarTitle" class="text-xs font-bold text-gray-500 dark:text-gray-400 tracking-widest uppercase">History</span>
            <button onclick="toggleSidebar()" class="text-gray-400 hover:text-gray-700 dark:hover:text-white transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
        </div>

        <!-- History Tab -->
        <div id="tabContentHistory" class="tab-content active flex-1 flex-col overflow-y-auto no-scrollbar p-3 gap-2">
            <button onclick="newChat()" class="w-full flex items-center justify-center gap-2 p-3 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 text-gray-800 dark:text-gray-200 border border-gray-300 dark:border-gray-600 transition-colors text-sm font-semibold shadow-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Chat
            </button>
            <div class="h-px bg-gray-200 dark:bg-gray-700 w-full my-1"></div>
            <div id="historyList" class="flex flex-col gap-1 w-full"></div>
        </div>

        <!-- Logs Tab -->
        <div id="tabContentLogs" class="tab-content flex-1 flex-col overflow-y-auto no-scrollbar p-4 text-[0.7rem] font-mono gap-1 text-gray-700 dark:text-gray-400">
            <div>> System initialized.</div>
        </div>

        <!-- Health Tab -->
        <div id="tabContentHealth" class="tab-content flex-1 flex-col overflow-y-auto no-scrollbar p-4 gap-4">
            <div class="flex justify-between items-center">
                <span class="text-xs text-gray-500 dark:text-gray-400">Endpoint Status</span>
                <button onclick="checkHealth()" class="text-xs bg-gray-200 dark:bg-gray-700 hover:bg-gray-300 dark:hover:bg-gray-600 px-2 py-1 rounded text-gray-700 dark:text-gray-300 transition">Ping</button>
            </div>
            
            <div id="healthList" class="flex flex-col gap-3 w-full"></div>

            <div class="mt-4 pt-4 border-t border-gray-200 dark:border-gray-700">
                <span class="text-xs text-gray-500 dark:text-gray-400 block mb-2">Session Usage</span>
                <div class="bg-gray-100 dark:bg-gray-900/50 border border-gray-200 dark:border-gray-700 rounded-lg p-3">
                    <div class="flex justify-between text-sm mb-1">
                        <span class="text-gray-500 dark:text-gray-400">Tokens</span>
                        <span id="metricTokens" class="font-mono text-gray-800 dark:text-gray-300">0</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500 dark:text-gray-400">Est. Spend</span>
                        <span id="metricCost" class="font-mono text-gray-800 dark:text-gray-300">$0.000</span>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Resizer Handle -->
    <div id="resizer" class="h-full"></div>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-full relative transition-colors duration-300">
        
        <!-- Header -->
        <header class="h-16 bg-white/80 dark:bg-gray-900/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 flex items-center justify-between px-6 z-10">
            <div class="flex items-center gap-4">
                <button id="sidebarToggleBtn" onclick="toggleSidebar()" class="hidden text-gray-400 hover:text-gray-700 dark:hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 id="chatTitle" class="text-sm font-semibold text-gray-700 dark:text-gray-300 truncate max-w-[300px]">New Chat</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <select id="providerSelect" onchange="updateModels()" class="bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-sm rounded-lg px-3 py-1.5 outline-none focus:border-gray-500 transition-colors cursor-pointer appearance-none">
                    {% for provider in providers.keys() %}
                        <option value="{{ provider }}">{{ provider }}</option>
                    {% endfor %}
                </select>
                <select id="modelSelect" class="bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-300 text-sm rounded-lg px-3 py-1.5 outline-none focus:border-gray-500 transition-colors cursor-pointer appearance-none max-w-[200px] truncate">
                </select>
            </div>
        </header>

        <!-- Chat History -->
        <main id="chatBox" class="flex-1 overflow-y-auto chat-scroll p-6 flex flex-col gap-6">
            <div id="welcomeMessage" class="flex flex-col gap-1 items-start w-full">
                <div class="flex items-center gap-2 mb-1 px-1">
                    <span class="text-xs font-semibold text-gray-500 dark:text-gray-400">System</span>
                </div>
                <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-5 py-3.5 rounded-2xl rounded-tl-sm max-w-[80%] text-sm text-gray-700 dark:text-gray-300 leading-relaxed shadow-sm">
                    Connected. Select Auto-Select to route your prompt automatically.
                </div>
            </div>
            
            <div id="typingIndicator" class="hidden flex-col gap-1 items-start w-full">
                <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-5 py-3 rounded-2xl rounded-tl-sm text-sm text-gray-500 dark:text-gray-400 italic flex items-center">
                    Processing <span class="ml-2 flex"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
                </div>
            </div>
        </main>

        <!-- Input Box -->
        <div class="p-6 pt-2 bg-gradient-to-t from-gray-50 dark:from-gray-950 to-transparent">
            <div class="max-w-4xl mx-auto relative bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-2xl p-2 flex items-end shadow-lg focus-within:border-gray-400 dark:focus-within:border-gray-500 transition-colors">
                <textarea id="userInput" rows="1"
                          class="w-full bg-transparent border-none text-gray-900 dark:text-gray-200 text-sm p-3 outline-none resize-none no-scrollbar max-h-32" 
                          placeholder="Message..."
                          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
                <button id="sendBtn" onclick="sendMessage()" class="p-3 m-1 bg-gray-800 dark:bg-gray-700 hover:bg-gray-700 dark:hover:bg-gray-600 text-white rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
        
    </div>

    <script>
        // ==========================================
        // Theme Management
        // ==========================================
        if (localStorage.theme === 'light') {
            document.documentElement.classList.remove('dark');
        } else {
            document.documentElement.classList.add('dark');
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        }

        // ==========================================
        // Sidebar Resizer Logic
        // ==========================================
        const resizer = document.getElementById('resizer');
        const sidebar = document.getElementById('sidebar');
        let isResizing = false;

        resizer.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.body.style.cursor = 'col-resize';
            e.preventDefault();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;
            // 64px is the width of the vertical nav
            const newWidth = e.clientX - 64; 
            if (newWidth > 200 && newWidth < 600) {
                sidebar.style.width = newWidth + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            if (isResizing) {
                isResizing = false;
                document.body.style.cursor = 'default';
            }
        });

        const providers = {{ providers | tojson | safe }};
        let sessionTokens = 0;
        let sessionCost = 0.0;
        let chats = JSON.parse(localStorage.getItem("divine_chats")) || [];
        let currentChatId = null;
        let chatHistory = [];
        let sidebarOpen = true;

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 128) + 'px';
        }

        function toggleSidebar() {
            const sidebarEl = document.getElementById("sidebar");
            const toggleBtn = document.getElementById("sidebarToggleBtn");
            if (sidebarOpen) {
                sidebarEl.style.display = "none";
                resizer.style.display = "none";
                toggleBtn.classList.remove("hidden");
                sidebarOpen = false;
            } else {
                sidebarEl.style.display = "flex";
                resizer.style.display = "block";
                toggleBtn.classList.add("hidden");
                sidebarOpen = true;
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            document.getElementById(`nav${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`).classList.add('active');
            document.getElementById(`tabContent${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`).classList.add('active');
            document.getElementById('sidebarTitle').innerText = tabName;

            if(!sidebarOpen) toggleSidebar();
            if(tabName === 'health') renderHealthList();
        }

        function addLog(message, type="info") {
            const logBox = document.getElementById("tabContentLogs");
            const entry = document.createElement("div");
            entry.innerText = `> ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateModels() {
            const provider = document.getElementById("providerSelect").value;
            const modelSelect = document.getElementById("modelSelect");
            modelSelect.innerHTML = "";
            if (providers[provider]) {
                providers[provider].forEach(model => {
                    const opt = document.createElement("option");
                    opt.value = model;
                    opt.innerText = model;
                    modelSelect.appendChild(opt);
                });
                addLog(`Context: ${provider}`, "info");
            }
        }
        updateModels();

        function saveChatsToStorage() {
            localStorage.setItem("divine_chats", JSON.stringify(chats));
            renderHistoryList();
        }

        function newChat() {
            currentChatId = Date.now().toString();
            chatHistory = [];
            const chatBox = document.getElementById("chatBox");
            const indicator = document.getElementById("typingIndicator");
            chatBox.innerHTML = `
            <div id="welcomeMessage" class="flex flex-col gap-1 items-start w-full">
                <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 px-5 py-3.5 rounded-2xl rounded-tl-sm max-w-[80%] text-sm text-gray-700 dark:text-gray-300 leading-relaxed shadow-sm">
                    Connected. Select Auto-Select to route your prompt automatically.
                </div>
            </div>`;
            chatBox.appendChild(indicator);
            document.getElementById("chatTitle").innerText = "New Chat";
            renderHistoryList();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function renderHistoryList() {
            const list = document.getElementById("historyList");
            list.innerHTML = "";
            const sortedChats = [...chats].sort((a, b) => b.updatedAt - a.updatedAt);
            sortedChats.forEach(chat => {
                const btn = document.createElement("button");
                btn.className = `w-full text-left p-3 rounded-lg text-sm truncate transition-colors border border-transparent ${chat.id === currentChatId ? 'bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-gray-100' : 'text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800'}`;
                btn.innerText = chat.title || "New Chat";
                btn.onclick = () => loadChat(chat.id);
                list.appendChild(btn);
            });
        }

        function loadChat(chatId) {
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;
            currentChatId = chatId;
            chatHistory = [...chat.history];
            document.getElementById("chatTitle").innerText = chat.title;
            const chatBox = document.getElementById("chatBox");
            const indicator = document.getElementById("typingIndicator");
            chatBox.innerHTML = "";
            chatBox.appendChild(indicator);
            chat.history.forEach(msg => appendMessageToUI(msg.role === 'user' ? 'You' : 'Divine', msg.content, msg.role === 'user' ? 'user' : 'ai'));
            renderHistoryList();
            scrollToBottom();
            if(window.innerWidth < 768) toggleSidebar();
        }

        function ensureChatSession(firstPrompt) {
            if (!currentChatId) currentChatId = Date.now().toString();
            let chat = chats.find(c => c.id === currentChatId);
            if (!chat) {
                chat = { id: currentChatId, title: firstPrompt.length > 30 ? firstPrompt.substring(0, 30) + "..." : firstPrompt, history: [], updatedAt: Date.now() };
                chats.push(chat);
                document.getElementById("chatTitle").innerText = chat.title;
            }
            return chat;
        }

        function updateCurrentChatStorage() {
            if(!currentChatId) return;
            let chat = chats.find(c => c.id === currentChatId);
            if(chat) { chat.history = chatHistory; chat.updatedAt = Date.now(); saveChatsToStorage(); }
        }

        if(chats.length > 0) {
            loadChat([...chats].sort((a, b) => b.updatedAt - a.updatedAt)[0].id);
        } else {
            newChat();
        }

        let apiHealth = {};
        Object.keys(providers).forEach(p => { if(p !== "Auto-Select") apiHealth[p] = providers[p].length > 0 ? "Online" : "Offline"; });

        function renderHealthList() {
            const list = document.getElementById("healthList");
            list.innerHTML = "";
            Object.keys(apiHealth).forEach(p => {
                const status = apiHealth[p];
                const dotColor = status === "Online" ? "bg-green-500" : (status === "Offline" ? "bg-red-500" : "bg-yellow-500");
                list.innerHTML += `
                <div class="flex items-center justify-between bg-gray-50 dark:bg-gray-900/50 p-3 rounded-lg border border-gray-200 dark:border-gray-700">
                    <div class="flex items-center gap-3">
                        <div class="w-2 h-2 rounded-full ${dotColor}"></div>
                        <div class="text-sm font-semibold text-gray-700 dark:text-gray-300">${p}</div>
                    </div>
                    <span class="text-xs font-mono text-gray-500 dark:text-gray-400">${status}</span>
                </div>`;
            });
        }
        renderHealthList();

        function checkHealth() {
            addLog("Pinging endpoints...");
            Object.keys(apiHealth).forEach(p => { apiHealth[p] = "Pinging..."; });
            renderHealthList();
            setTimeout(() => {
                Object.keys(providers).forEach(p => { if(p !== "Auto-Select") apiHealth[p] = providers[p].length > 0 ? "Online" : "Offline"; });
                renderHealthList();
                addLog("Health check complete.");
            }, 1000);
        }

        function updateMetrics(usage) {
            if(!usage || !usage.total_tokens) return;
            sessionTokens += usage.total_tokens;
            document.getElementById("metricTokens").innerText = sessionTokens.toLocaleString();
            sessionCost += (usage.total_tokens / 1000000) * 0.50;
            document.getElementById("metricCost").innerText = "$" + sessionCost.toFixed(4);
        }

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            const provider = document.getElementById("providerSelect").value;
            const model = document.getElementById("modelSelect").value;
            const sendBtn = document.getElementById("sendBtn");
            const indicator = document.getElementById("typingIndicator");

            if (!text) return;
            ensureChatSession(text);
            const welcome = document.getElementById("welcomeMessage");
            if (welcome) welcome.remove();

            appendMessageToUI("You", text, "user");
            input.value = ""; input.style.height = 'auto'; 
            input.disabled = true; sendBtn.disabled = true;
            
            const chatBox = document.getElementById("chatBox");
            chatBox.appendChild(indicator);
            indicator.classList.remove("hidden"); indicator.classList.add("flex");
            scrollToBottom();

            const startTime = performance.now();
            try {
                const response = await fetch("/api/chat", {
                    method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ provider, model, prompt: text, history: chatHistory })
                });

                const data = await response.json();
                indicator.classList.add("hidden"); indicator.classList.remove("flex");

                if (data.success) {
                    chatHistory.push({"role": "user", "content": text});
                    chatHistory.push({"role": "assistant", "content": data.reply});
                    updateCurrentChatStorage();
                    if(data.usage) updateMetrics(data.usage);
                    appendMessageToUI("Divine", data.reply, "ai");
                } else {
                    appendMessageToUI("System Error", data.error, "ai");
                }
            } catch (err) {
                indicator.classList.add("hidden"); indicator.classList.remove("flex");
                appendMessageToUI("System Error", "Connection failed.", "ai");
            }

            input.disabled = false; sendBtn.disabled = false; input.focus();
            scrollToBottom();
        }

        function escapeHTML(str) { return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }

        function appendMessageToUI(sender, text, type) {
            const chatBox = document.getElementById("chatBox");
            const indicator = document.getElementById("typingIndicator");
            const row = document.createElement("div");
            row.className = `flex flex-col gap-1 w-full ${type === 'user' ? 'items-end' : 'items-start'}`;
            
            let htmlContent = "";
            let textStyles = "";
            
            if (type === 'user') {
                htmlContent = escapeHTML(text).replace(/\n/g, '<br>');
                textStyles = "px-5 py-3.5 rounded-2xl max-w-[85%] text-sm leading-relaxed bg-gray-200 dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-tr-sm no-scrollbar overflow-hidden";
            } else {
                htmlContent = marked.parse(text);
                textStyles = "px-5 py-3.5 rounded-2xl max-w-[85%] text-sm leading-relaxed border bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-gray-800 dark:text-gray-200 rounded-tl-sm no-scrollbar overflow-hidden prose dark:prose-invert prose-sm prose-pre:bg-gray-100 dark:prose-pre:bg-gray-900 prose-pre:border prose-pre:border-gray-200 dark:prose-pre:border-gray-700 max-w-none";
            }

            row.innerHTML = `
                <div class="flex items-center gap-2 mb-1 px-1">
                    <span class="text-xs font-semibold text-gray-500 dark:text-gray-400">${sender}</span>
                </div>
                <div class="${textStyles}">${htmlContent}</div>
            `;
            chatBox.insertBefore(row, indicator);
            
            // Add Copy Buttons to new code blocks
            if (type !== 'user') {
                const preBlocks = row.querySelectorAll('pre');
                preBlocks.forEach(pre => {
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.innerText = 'Copy';
                    btn.onclick = () => {
                        navigator.clipboard.writeText(pre.querySelector('code').innerText);
                        btn.innerText = 'Copied!';
                        setTimeout(() => btn.innerText = 'Copy', 2000);
                    };
                    pre.appendChild(btn);
                });
            }
        }

        function scrollToBottom() {
            const chatBox = document.getElementById("chatBox");
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
