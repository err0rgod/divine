<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine | Intelligence Engine</title>
    <!-- Tailwind with Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <!-- Marked.js for Markdown Parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Hide scrollbar for textarea and logs but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Subtle custom scrollbar for main chat area */
        .chat-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .chat-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        body {
            background-color: #030712;
            background-image: radial-gradient(circle at top left, rgba(79, 70, 229, 0.05), transparent 40%),
                              radial-gradient(circle at bottom right, rgba(147, 51, 234, 0.05), transparent 40%);
        }

        .glass-panel {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Typing dot animation */
        .dot {
            animation: blink 1.4s infinite both;
            height: 4px; width: 4px; background: currentColor;
            border-radius: 50%; display: inline-block; margin: 0 2px;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

        /* Sidebar Tabs */
        .tab-btn {
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #9ca3af;
            border-bottom: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            color: #818cf8;
            border-bottom-color: #818cf8;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: flex;
        }
    </style>
</head>
<body class="text-gray-100 h-screen w-screen overflow-hidden flex antialiased">

    <!-- Collapsible Sidebar -->
    <aside id="sidebar" class="w-80 h-full glass-panel border-r border-white/5 flex flex-col transition-all duration-300 relative z-20">
        <!-- Sidebar Header & Tabs -->
        <div class="flex flex-col border-b border-white/5">
            <div class="p-4 pb-2 flex justify-between items-center">
                <span class="text-sm font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent tracking-tight">DIVINE PANEL</span>
                <button onclick="toggleSidebar()" class="text-gray-500 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
            </div>
            <div class="flex px-2">
                <button id="tabBtnHistory" onclick="switchTab('history')" class="tab-btn active w-1/2">History</button>
                <button id="tabBtnLogs" onclick="switchTab('logs')" class="tab-btn w-1/2">Logs</button>
            </div>
        </div>

        <!-- History Tab Content -->
        <div id="tabContentHistory" class="tab-content active flex-1 flex-col overflow-y-auto no-scrollbar p-2 gap-1">
            <button onclick="newChat()" class="w-full flex items-center gap-2 p-3 mb-2 rounded-lg bg-indigo-600/10 hover:bg-indigo-600/20 text-indigo-300 border border-indigo-500/20 transition-colors text-sm font-semibold">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                New Chat
            </button>
            <div id="historyList" class="flex flex-col gap-1 w-full">
                <!-- Chat items populated by JS -->
            </div>
        </div>

        <!-- Logs Tab Content -->
        <div id="tabContentLogs" class="tab-content flex-1 flex-col overflow-y-auto no-scrollbar p-4 text-[0.7rem] font-mono gap-1">
            <div class="text-indigo-400">[*] Divine Engine initialized. Verified endpoints loaded.</div>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-full relative">
        
        <!-- Header -->
        <header class="h-16 glass-panel border-b border-white/5 flex items-center justify-between px-6 z-10">
            <div class="flex items-center gap-4">
                <button id="sidebarToggleBtn" onclick="toggleSidebar()" class="hidden text-gray-500 hover:text-white transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h1 id="chatTitle" class="text-sm font-semibold text-gray-300 truncate max-w-[300px]">New Chat</h1>
            </div>
            
            <div class="flex items-center gap-3">
                <select id="providerSelect" onchange="updateModels()" class="bg-gray-900/50 border border-white/10 text-gray-300 text-sm rounded-lg px-3 py-1.5 outline-none focus:border-indigo-500 transition-colors cursor-pointer appearance-none">
                    {% for provider in providers.keys() %}
                        <option value="{{ provider }}">{{ provider }}</option>
                    {% endfor %}
                </select>
                <select id="modelSelect" class="bg-gray-900/50 border border-white/10 text-gray-300 text-sm rounded-lg px-3 py-1.5 outline-none focus:border-indigo-500 transition-colors cursor-pointer appearance-none max-w-[200px] truncate">
                    <!-- Populated via JS -->
                </select>
            </div>
        </header>

        <!-- Chat History -->
        <main id="chatBox" class="flex-1 overflow-y-auto chat-scroll p-6 flex flex-col gap-6">
            <!-- Initial Message -->
            <div id="welcomeMessage" class="flex flex-col gap-1 items-start w-full">
                <div class="flex items-center gap-2 mb-1 px-1">
                    <span class="text-xs font-semibold text-gray-400">Divine System</span>
                </div>
                <div class="glass-panel px-5 py-3.5 rounded-2xl rounded-tl-sm max-w-[80%] text-sm text-gray-300 leading-relaxed shadow-lg">
                    Welcome to the Divine Dashboard. You are securely connected.<br><br>
                    Select <span class="text-indigo-400 font-semibold">Auto-Select</span> to let the Meta-Router dynamically pick the best hardware for your prompt.
                </div>
            </div>
            
            <!-- Typing Indicator -->
            <div id="typingIndicator" class="hidden flex-col gap-1 items-start w-full">
                <div class="glass-panel px-5 py-3 rounded-2xl rounded-tl-sm text-sm text-gray-400 italic flex items-center">
                    Processing <span class="ml-2 flex"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span>
                </div>
            </div>
        </main>

        <!-- Input Box -->
        <div class="p-6 pt-2 bg-gradient-to-t from-gray-950 to-transparent">
            <div class="max-w-4xl mx-auto relative glass-panel rounded-2xl p-2 flex items-end shadow-2xl focus-within:border-indigo-500/50 transition-colors">
                <textarea id="userInput" 
                          rows="1"
                          class="w-full bg-transparent border-none text-gray-200 text-sm p-3 outline-none resize-none no-scrollbar max-h-32" 
                          placeholder="Command Divine... (Shift+Enter for newline)"
                          onkeydown="handleKey(event)" 
                          oninput="autoResize(this)"></textarea>
                <button id="sendBtn" onclick="sendMessage()" class="p-3 m-1 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl transition-all disabled:opacity-50 disabled:cursor-not-allowed">
                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
        
    </div>

    <script>
        const providers = {{ providers | tojson | safe }};
        
        // Chat Session State
        let chats = JSON.parse(localStorage.getItem("divine_chats")) || [];
        let currentChatId = null;
        let chatHistory = []; // Current active API history array
        
        let sidebarOpen = true;

        // Auto resize textarea without scrollbars
        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 128) + 'px'; // 128px is roughly 5-6 lines
        }

        function toggleSidebar() {
            const sidebar = document.getElementById("sidebar");
            const toggleBtn = document.getElementById("sidebarToggleBtn");
            if (sidebarOpen) {
                sidebar.style.marginLeft = "-320px";
                sidebar.style.opacity = "0";
                toggleBtn.classList.remove("hidden");
                sidebarOpen = false;
            } else {
                sidebar.style.marginLeft = "0";
                sidebar.style.opacity = "1";
                toggleBtn.classList.add("hidden");
                sidebarOpen = true;
            }
        }

        function switchTab(tabName) {
            document.getElementById('tabBtnHistory').classList.remove('active');
            document.getElementById('tabBtnLogs').classList.remove('active');
            document.getElementById('tabContentHistory').classList.remove('active');
            document.getElementById('tabContentLogs').classList.remove('active');

            if(tabName === 'history') {
                document.getElementById('tabBtnHistory').classList.add('active');
                document.getElementById('tabContentHistory').classList.add('active');
            } else {
                document.getElementById('tabBtnLogs').classList.add('active');
                document.getElementById('tabContentLogs').classList.add('active');
            }
        }

        // Add plain text log entry
        function addLog(message, type="info") {
            const logBox = document.getElementById("tabContentLogs");
            const entry = document.createElement("div");
            
            // Minimalist colors
            let colorClass = "text-gray-400";
            if(type === "success") colorClass = "text-emerald-400";
            if(type === "error") colorClass = "text-rose-400";
            if(type === "routing") colorClass = "text-amber-400";

            entry.className = `${colorClass}`;
            entry.innerText = `> ${message}`;
            
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateModels() {
            const provider = document.getElementById("providerSelect").value;
            const modelSelect = document.getElementById("modelSelect");
            modelSelect.innerHTML = "";
            
            if (providers[provider]) {
                providers[provider].forEach(model => {
                    const opt = document.createElement("option");
                    opt.value = model;
                    opt.innerText = model;
                    modelSelect.appendChild(opt);
                });
                addLog(`Context: ${provider}`, "info");
            }
        }

        updateModels(); // Init

        // ==========================================
        // Chat History & Local Storage Management
        // ==========================================

        function saveChatsToStorage() {
            localStorage.setItem("divine_chats", JSON.stringify(chats));
            renderHistoryList();
        }

        function newChat() {
            currentChatId = Date.now().toString();
            chatHistory = []; // Reset active API history
            
            // Clear UI
            const chatBox = document.getElementById("chatBox");
            const indicator = document.getElementById("typingIndicator");
            chatBox.innerHTML = "";
            
            // Restore welcome message
            const welcomeHtml = `
            <div id="welcomeMessage" class="flex flex-col gap-1 items-start w-full">
                <div class="flex items-center gap-2 mb-1 px-1">
                    <span class="text-xs font-semibold text-gray-400">Divine System</span>
                </div>
                <div class="glass-panel px-5 py-3.5 rounded-2xl rounded-tl-sm max-w-[80%] text-sm text-gray-300 leading-relaxed shadow-lg">
                    Welcome to the Divine Dashboard. You are securely connected.<br><br>
                    Select <span class="text-indigo-400 font-semibold">Auto-Select</span> to let the Meta-Router dynamically pick the best hardware for your prompt.
                </div>
            </div>`;
            chatBox.innerHTML = welcomeHtml;
            chatBox.appendChild(indicator);
            
            document.getElementById("chatTitle").innerText = "New Chat";
            renderHistoryList();
            
            // If on mobile, auto-close sidebar on new chat
            if(window.innerWidth < 768) toggleSidebar();
        }

        function renderHistoryList() {
            const list = document.getElementById("historyList");
            list.innerHTML = "";
            
            // Sort chats by newest first
            const sortedChats = [...chats].sort((a, b) => b.updatedAt - a.updatedAt);
            
            sortedChats.forEach(chat => {
                const btn = document.createElement("button");
                btn.className = `w-full text-left p-3 rounded-lg text-sm truncate transition-colors ${chat.id === currentChatId ? 'bg-white/10 text-white' : 'text-gray-400 hover:bg-white/5 hover:text-gray-200'}`;
                btn.innerText = chat.title || "New Chat";
                btn.onclick = () => loadChat(chat.id);
                list.appendChild(btn);
            });
        }

        function loadChat(chatId) {
            const chat = chats.find(c => c.id === chatId);
            if (!chat) return;
            
            currentChatId = chatId;
            chatHistory = [...chat.history]; // Restore API history
            document.getElementById("chatTitle").innerText = chat.title;
            
            // Clear UI
            const chatBox = document.getElementById("chatBox");
            const indicator = document.getElementById("typingIndicator");
            chatBox.innerHTML = "";
            chatBox.appendChild(indicator);
            
            // Rebuild UI bubbles
            chat.history.forEach(msg => {
                // UI reconstructs user and AI messages. We don't store meta badges currently to keep it light, 
                // but we render them correctly as user/ai.
                appendMessageToUI(msg.role === 'user' ? 'You' : 'Divine', msg.content, msg.role === 'user' ? 'user' : 'ai');
            });
            
            renderHistoryList();
            scrollToBottom();
            
            if(window.innerWidth < 768) toggleSidebar();
        }

        function ensureChatSession(firstPrompt) {
            if (!currentChatId) {
                currentChatId = Date.now().toString();
            }
            let chat = chats.find(c => c.id === currentChatId);
            if (!chat) {
                chat = {
                    id: currentChatId,
                    title: firstPrompt.length > 30 ? firstPrompt.substring(0, 30) + "..." : firstPrompt,
                    history: [],
                    updatedAt: Date.now()
                };
                chats.push(chat);
                document.getElementById("chatTitle").innerText = chat.title;
            }
            return chat;
        }

        function updateCurrentChatStorage(newMessages) {
            if(!currentChatId) return;
            let chat = chats.find(c => c.id === currentChatId);
            if(chat) {
                chat.history = chatHistory; // Sync history
                chat.updatedAt = Date.now();
                saveChatsToStorage();
            }
        }

        // Initialize session
        if(chats.length > 0) {
            // Load most recent chat
            const sortedChats = [...chats].sort((a, b) => b.updatedAt - a.updatedAt);
            loadChat(sortedChats[0].id);
        } else {
            newChat();
        }

        // ==========================================
        // Message Handling
        // ==========================================

        function handleKey(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById("userInput");
            const text = input.value.trim();
            const provider = document.getElementById("providerSelect").value;
            const model = document.getElementById("modelSelect").value;
            const sendBtn = document.getElementById("sendBtn");
            const indicator = document.getElementById("typingIndicator");

            if (!text) return;

            // Session Management
            ensureChatSession(text);
            
            // Remove welcome message if exists
            const welcome = document.getElementById("welcomeMessage");
            if (welcome) welcome.remove();

            appendMessageToUI("You", text, "user");
            input.value = "";
            input.style.height = 'auto'; 
            
            input.disabled = true;
            sendBtn.disabled = true;
            
            const chatBox = document.getElementById("chatBox");
            chatBox.appendChild(indicator);
            indicator.classList.remove("hidden");
            indicator.classList.add("flex");
            
            scrollToBottom();

            const startTime = performance.now();
            if(provider === "Auto-Select") {
                addLog(`Analyzing prompt via Meta-Router...`, "routing");
            } else {
                addLog(`Req: ${provider}/${model}`, "info");
            }

            try {
                const response = await fetch("/api/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ provider, model, prompt: text, history: chatHistory })
                });

                const data = await response.json();
                const latency = ((performance.now() - startTime) / 1000).toFixed(2);
                
                indicator.classList.add("hidden");
                indicator.classList.remove("flex");

                if (data.success) {
                    chatHistory.push({"role": "user", "content": text});
                    chatHistory.push({"role": "assistant", "content": data.reply});
                    updateCurrentChatStorage();
                    
                    let metaText = `${latency}s`;
                    if (data.auto_selected && !data.failover_occurred) {
                        metaText += ` • ${data.provider_used} (${data.model_used})`;
                        addLog(`Routed: ${data.provider_used} -> ${data.model_used}`, "success");
                    }
                    if (data.failover_occurred) {
                        metaText += ` • 🚨 Auto-Recovered via ${data.provider_used} (${data.model_used})`;
                        addLog(`Failover Success: ${data.original_provider} crashed. Recovered via ${data.provider_used}`, "routing");
                    }
                    
                    addLog(`Res: 200 OK (${latency}s)`, "success");
                    appendMessageToUI("Divine", data.reply, "ai", metaText);
                } else {
                    addLog(`Err: ${data.error}`, "error");
                    appendMessageToUI("System Error", data.error, "ai", "Failure");
                }
            } catch (err) {
                indicator.classList.add("hidden");
                indicator.classList.remove("flex");
                addLog(`Net Err: ${err.message}`, "error");
                appendMessageToUI("System Error", "Connection failed.", "ai", "Error");
            }

            input.disabled = false;
            sendBtn.disabled = false;
            input.focus();
            scrollToBottom();
        }

        function escapeHTML(str) {
            return str.replace(/&/g, "&amp;")
                      .replace(/</g, "&lt;")
                      .replace(/>/g, "&gt;");
        }

        function appendMessageToUI(sender, text, type, meta=null) {
            const chatBox = document.getElementById("chatBox");
            const indicator = document.getElementById("typingIndicator");
            
            const row = document.createElement("div");
            row.className = `flex flex-col gap-1 w-full ${type === 'user' ? 'items-end' : 'items-start'}`;
            
            let htmlContent = "";
            let textStyles = "";
            
            if (type === 'user') {
                htmlContent = escapeHTML(text).replace(/\n/g, '<br>');
                textStyles = "px-5 py-3.5 rounded-2xl max-w-[85%] text-sm leading-relaxed border bg-indigo-600/20 border-indigo-500/30 text-indigo-50 rounded-tr-sm no-scrollbar overflow-hidden";
            } else {
                htmlContent = marked.parse(text);
                textStyles = "px-5 py-3.5 rounded-2xl max-w-[85%] text-sm leading-relaxed border glass-panel rounded-tl-sm no-scrollbar overflow-hidden prose prose-invert prose-sm prose-pre:bg-gray-950 prose-pre:border prose-pre:border-white/5 max-w-none";
            }

            let metaHtml = meta ? `<span class="ml-2 px-2 py-0.5 rounded-full bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-[0.65rem]">${meta}</span>` : '';
            
            row.innerHTML = `
                <div class="flex items-center gap-2 mb-1 px-1">
                    <span class="text-xs font-semibold ${type === 'user' ? 'text-indigo-300' : 'text-gray-400'}">${sender}</span>
                    ${metaHtml}
                </div>
                <div class="${textStyles}">
                    ${htmlContent}
                </div>
            `;
            
            chatBox.insertBefore(row, indicator);
        }

        function scrollToBottom() {
            const chatBox = document.getElementById("chatBox");
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
