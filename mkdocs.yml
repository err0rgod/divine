site_name: Divine Router
site_description: Local-first, self-hostable AI API gateway
site_author: Divine Router contributors
site_url: https://divine-router-docs-err0rgod.onrender.com/
repo_url: https://github.com/err0rgod/divine
repo_name: err0rgod/divine
copyright: Copyright &copy; 2026 Divine Router contributors

theme:
  name: material
  language: en
  icon:
    logo: material/transit-connection-variant
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Use dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Use light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra:
  version:
    provider: mike
    default: 0.1
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/err0rgod/divine
      name: Divine Router repository

nav:
  - Home: index.md
  - Get started:
      - Installation: installation.md
      - Quick start: quick-start.md
      - Configuration: configuration.md
      - Provider setup: providers.md
      - Provider compatibility: provider-compatibility.md
  - API:
      - Chat Completions: api/chat-completions.md
      - Responses: api/responses.md
      - Anthropic Messages: api/anthropic-messages.md
  - Routing:
      - Automatic routing: routing/automatic.md
      - Aliases: routing/aliases.md
      - Fallback chains: routing/fallbacks.md
  - Operations:
      - CLI reference: cli.md
      - TUI guide: tui.md
  - Coding agents:
      - Claude Code: integrations/claude-code.md
      - Codex CLI: integrations/codex.md
      - OpenCode: integrations/opencode.md
      - Aider: integrations/aider.md
  - Deploy and design:
      - Security: security.md
      - Self-hosting: self-hosting.md
      - Architecture: architecture.md
  - Project:
      - Troubleshooting: troubleshooting.md
      - Contributing: contributing.md
      - Changelog: changelog.md
      - Limitations: limitations.md
